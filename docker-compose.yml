services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: threatflow
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: threatflow
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatflow"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: [./backend:/app]
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://threatflow:secret@postgres:5432/threatflow
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]

  worker:
    build: ./backend
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes: [./backend:/app]
    environment:
      DATABASE_URL: postgresql://threatflow:secret@postgres:5432/threatflow
      REDIS_URL: redis://redis:6379/0
    depends_on: [backend]

  beat:
    build: ./backend
    command: celery -A app.core.celery_app beat --loglevel=info
    volumes: [./backend:/app]
    environment:
      DATABASE_URL: postgresql://threatflow:secret@postgres:5432/threatflow
      REDIS_URL: redis://redis:6379/0
    depends_on: [worker]

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    volumes: [./frontend/src:/app/src]
    depends_on: [backend]

volumes:
  pgdata:
